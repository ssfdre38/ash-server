name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── Build self-contained binaries for every target ─────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            binary: ash-server.exe
          - rid: linux-x64
            os: ubuntu-latest
            binary: ash-server
          - rid: linux-arm64
            os: ubuntu-latest
            binary: ash-server
          - rid: osx-x64
            os: macos-latest
            binary: ash-server
          - rid: osx-arm64
            os: macos-latest
            binary: ash-server

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ash-server-cs.csproj

      - name: Publish (${{ matrix.rid }})
        run: |
          version="${{ github.ref_name }}"
          numeric="${version#v}"
          dotnet publish ash-server-cs.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:AssemblyVersion=${numeric} \
            -p:FileVersion=${numeric} \
            -p:InformationalVersion=${version} \
            -o build/dist/${{ matrix.rid }}
        shell: bash

      - name: Verify binary
        run: |
          ls -lh build/dist/${{ matrix.rid }}/
        shell: bash

      - name: Package (zip)
        run: |
          version="${{ github.ref_name }}"
          rid="${{ matrix.rid }}"
          zipname="ash-server-${version}-${rid}.zip"
          staging="build/dist/${rid}"

          # Ensure the Unix binary has the executable bit set before zipping
          if [[ -f "$staging/ash-server" ]]; then
            chmod +x "$staging/ash-server"
          fi

          # Include install scripts so the zip layout matches the README quick-start
          mkdir -p "$staging/build/linux"
          cp build/linux/install.sh "$staging/build/linux/install.sh"
          chmod +x "$staging/build/linux/install.sh"
          if [[ -d "build/macos" ]]; then
            mkdir -p "$staging/build/macos"
            cp build/macos/install.sh "$staging/build/macos/install.sh" 2>/dev/null || true
            chmod +x "$staging/build/macos/install.sh" 2>/dev/null || true
          fi

          # Normalise Plugins → plugins so Linux case-sensitive filesystems work OOTB
          if [[ -d "$staging/Plugins" && ! -d "$staging/plugins" ]]; then
            mv "$staging/Plugins" "$staging/plugins"
          fi

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path '$staging/*' -DestinationPath 'build/dist/${zipname}'"
          else
            (cd "$staging" && zip -r "../$zipname" .)
          fi
          echo "ASSET_PATH=build/dist/$zipname" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$zipname" >> "$GITHUB_ENV"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 1

  # ── Build Windows NSIS installer (depends on win-x64 build) ───────────────
  windows-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: build/dist/

      - name: Extract win-x64 zip
        run: |
          $zip = Get-ChildItem "build\dist\*.zip" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $zip) { Write-Error "No zip found in build\dist\"; exit 1 }
          Expand-Archive -Path $zip -DestinationPath "build\dist\win-x64" -Force
        shell: powershell

      - name: Update version in NSIS script
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content build\windows\installer.nsi) `
            -replace '!define PRODUCT_VERSION.*', "!define PRODUCT_VERSION `"$version`"" |
            Set-Content build\windows\installer.nsi
        shell: powershell

      - name: Download and Stage Windows Offline Dependencies
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\dependencies
          
          # Download SQLite3 Tools and extract sqlite3.exe
          $sqliteUrl = "https://www.sqlite.org/2026/sqlite-tools-win-x64-3530100.zip"
          $sqliteZip = "build\windows\dependencies\sqlite-tools.zip"
          Invoke-WebRequest -Uri $sqliteUrl -OutFile $sqliteZip
          Expand-Archive -Path $sqliteZip -DestinationPath "build\windows\dependencies\sqlite-temp" -Force
          Get-ChildItem -Path "build\windows\dependencies\sqlite-temp" -Filter "sqlite3.exe" -Recurse | Copy-Item -Destination "build\windows\dependencies\sqlite3.exe" -Force
          Remove-Item -Recurse -Force -Path "build\windows\dependencies\sqlite-temp", $sqliteZip

          # Download Tailscale MSI Setup
          $tailscaleUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          Invoke-WebRequest -Uri $tailscaleUrl -OutFile "build\windows\dependencies\tailscale-setup.msi"
        shell: powershell

      - name: Build NSIS installer
        run: |
          choco install nsis --no-progress -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" build\windows\installer.nsi
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/dist/ash-server-*-windows-x64-setup.exe
          retention-days: 1

  # ── Create GitHub Release and attach all assets ────────────────────────────
  release:
    needs: [build, windows-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Extract linux-x64 artifact for nfpm packaging
        run: |
          mkdir -p build/dist/linux-x64
          zipfile=$(find release-assets/ -name "*linux-x64.zip" | head -n 1)
          if [ -n "$zipfile" ]; then
            unzip -o "$zipfile" -d build/dist/linux-x64
          else
            echo "Error: linux-x64 zip not found!"
            exit 1
          fi
        shell: bash

      - name: Build Debian and RPM packages using nfpm
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.2/nfpm_2.41.2_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin nfpm
          version="${{ github.ref_name }}"
          numeric="${version#v}"
          nfpm package --config nfpm.yaml --packager deb --target release-assets/ --version "${numeric}"
          nfpm package --config nfpm.yaml --packager rpm --target release-assets/ --version "${numeric}"
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Ash Server ${{ github.ref_name }}"
          body: |
            ## Ash Server ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (x64) installer | `ash-server-*-windows-x64-setup.exe` |
            | Windows (x64) zip       | `ash-server-*-win-x64.zip` |
            | Linux (x64)             | `ash-server-*-linux-x64.zip` |
            | Linux (arm64)           | `ash-server-*-linux-arm64.zip` |
            | macOS (Apple Silicon)   | `ash-server-*-osx-arm64.zip` |
            | macOS (Intel)           | `ash-server-*-osx-x64.zip` |
            | Debian / Ubuntu Package  | `ash-server_*_amd64.deb` |
            | RedHat / Fedora Package  | `ash-server-*-1.x86_64.rpm` |

            ### Quick install

            **Windows** — Run the `.exe` installer as Administrator.

            **Native Linux Packages (Recommended)**
            *   **Debian / Ubuntu**:
                ```bash
                sudo apt install ./ash-server_*_amd64.deb
                ```
            *   **Fedora / RedHat**:
                ```bash
                sudo dnf install ./ash-server-*.x86_64.rpm
                ```

            **Linux Zip Script**
            ```bash
            unzip ash-server-*-linux-x64.zip -d ash-server
            sudo bash ash-server/build/linux/install.sh ash-server/ash-server
            ```

            **macOS**
            ```bash
            unzip ash-server-*-osx-arm64.zip -d ash-server
            sudo bash ash-server/build/macos/install.sh ash-server/ash-server
            ```

            After install, open **http://localhost:18799/admin.html** to configure.
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
